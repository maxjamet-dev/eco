appId: app.eco.grabador
productName: eco
copyright: Copyright © 2026 Max Jamet

directories:
  buildResources: build
  output: release/${version}

files:
  - out/**/*
  - package.json

# Recursos pesados (modelos, binarios nativos, worker python) se resuelven
# en el primer arranque, no se empaquetan (ADR-7). Solo se incluye el binario
# de captura Rust si existe compilado, y los íconos de la bandeja.
extraResources:
  - from: resources/
    to: resources/
    filter:
      - '**/*'
  # Scripts del worker whisperX (worker.py, audio_io.py, compat.py).
  # NO se empaqueta el .venv: el entorno se crea en %APPDATA%/eco en el 1er arranque.
  - from: python/
    to: python/
    filter:
      - '*.py'
  # Binario de captura Rust (debe estar compilado: cargo build --release).
  - from: native/target/release/meetcap.exe
    to: capture/meetcap.exe

asarUnpack:
  - '**/*.node'
  - resources/**

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-setup.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: eco

# Auto-update vía GitHub Releases (electron-updater). Repo: maxjamet-dev/eco
publish:
  provider: github
  owner: maxjamet-dev
  repo: eco
  releaseType: release
